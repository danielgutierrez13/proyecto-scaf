<div class="carrera-container">
  <h2>Gestión de Carreras</h2>

  <!-- Formulario CRUD -->
  <form [formGroup]="carreraForm" class="carrera-form">
    <mat-form-field appearance="outline">
      <mat-label>Nombre de la Carrera</mat-label>
      <input matInput formControlName="nombre" placeholder="Ingrese nombre de carrera" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" placeholder="Ingrese descripción"></textarea>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" (click)="agregar()">Agregar</button>
      <button mat-raised-button color="accent" (click)="actualizar()">Actualizar</button>
      <button mat-raised-button color="warn" (click)="limpiar()">Limpiar</button>
    </div>
  </form>

  <!-- Tabla con Angular Material -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- ID Columna -->
    <ng-container matColumnDef="idCarrera">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let carrera">{{ carrera.idCarrera }}</td>
    </ng-container>

    <!-- Nombre Columna -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let carrera">{{ carrera.nombre }}</td>
    </ng-container>

    <!-- Descripción Columna -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let carrera">{{ carrera.descripcion }}</td>
    </ng-container>

    <!-- Acciones Columna -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let carrera">
        <button mat-icon-button color="primary" (click)="editar(carrera)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(carrera)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
