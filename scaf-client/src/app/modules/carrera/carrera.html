<div class="carrera-container">
  <div class="page-header">
    <h2>Gestion de Carreras</h2>

    <a mat-raised-button color="primary" routerLink="/layout/carreras/crear">
      <mat-icon>add</mat-icon>
      Agregar
    </a>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="codigoCarrera">
        <th mat-header-cell *matHeaderCellDef>Codigo</th>
        <td mat-cell *matCellDef="let carrera">{{ carrera.codigoCarrera }}</td>
      </ng-container>

      <ng-container matColumnDef="nombreCarrera">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let carrera">{{ carrera.nombreCarrera }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripcion</th>
        <td mat-cell *matCellDef="let carrera">{{ carrera.descripcion }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let carrera">
          <a
            mat-icon-button
            color="primary"
            aria-label="Editar carrera"
            [routerLink]="['/layout/carreras/editar', carrera.codigoCarrera]">
            <mat-icon>edit</mat-icon>
          </a>
          <a
            mat-icon-button
            color="warn"
            aria-label="Eliminar carrera"
            [routerLink]="['/layout/carreras/eliminar', carrera.codigoCarrera]">
            <mat-icon>delete</mat-icon>
          </a>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row empty-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          No hay carreras registradas.
        </td>
      </tr>
    </table>
  </div>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="cambiarPagina($event)"
    showFirstLastButtons>
  </mat-paginator>
</div>
