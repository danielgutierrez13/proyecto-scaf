<div class="carrera-container">
  <div class="page-header">
    <h2>Crear Carrera</h2>

    <a mat-stroked-button routerLink="/layout/carreras">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </a>
  </div>

  <form [formGroup]="carreraForm" class="carrera-form" (ngSubmit)="guardar()">
    <mat-form-field appearance="outline">
      <mat-label>Nombre de la Carrera</mat-label>
      <input matInput formControlName="nombreCarrera" placeholder="Ingrese nombre de carrera" />
      @if (carreraForm.get('nombreCarrera')?.hasError('required')) {
        <mat-error>El nombre de la carrera es obligatorio</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripcion</mat-label>
      <textarea matInput formControlName="descripcion" placeholder="Ingrese descripcion"></textarea>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" type="submit" [disabled]="cargando">
        <mat-icon>save</mat-icon>
        Guardar
      </button>
      <button mat-raised-button color="warn" type="button" (click)="limpiar()">
        <mat-icon>clear</mat-icon>
        Limpiar
      </button>
    </div>
  </form>
</div>
