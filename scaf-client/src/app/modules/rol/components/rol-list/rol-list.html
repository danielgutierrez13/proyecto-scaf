<section class="list-page">
  <div class="list-title">
    <h2>Roles</h2>
    <a mat-flat-button routerLink="/layout/roles/crear">Nuevo rol</a>
  </div>

  @if (error()) {
    <div class="alert" role="alert">{{ error() }}</div>
  }

  @if (cargando()) {
    <div class="empty-state">Cargando roles...</div>
  } @else if (!roles().length) {
    <div class="empty-state">No hay roles registrados.</div>
  } @else {
    <div class="table-wrap">
      <table mat-table [dataSource]="roles()">
        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef>Codigo</th>
          <td mat-cell *matCellDef="let rol">{{ rol.codigoRol }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let rol">{{ rol.nombreRol }}</td>
        </ng-container>

        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef>Descripcion</th>
          <td mat-cell *matCellDef="let rol">{{ rol.descripcion }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let rol">
            <div class="row-actions">
              <a mat-button [routerLink]="['/layout/roles/editar', rol.codigoRol]">Editar</a>
              <button mat-button type="button" color="warn" (click)="eliminarRol(rol)">Eliminar</button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['codigo', 'nombre', 'descripcion', 'acciones']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['codigo', 'nombre', 'descripcion', 'acciones'];"></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalItems()"
      [pageIndex]="paginaActual()"
      [pageSize]="pageSize"
      [hidePageSize]="true"
      (page)="cargarRoles($event.pageIndex)"
    />
  }
</section>
