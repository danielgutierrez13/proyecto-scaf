<div class="login-container">
  <div class="login-box">
    <!-- Header -->
    <div class="login-header">
      <h1 class="login-title">SCAF</h1>
      <p class="login-subtitle">Sistema de Control</p>
    </div>

    <form class="login-form">

      <div class="form-group">
        <label for="email" class="form-label">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="ingresa tu correo"
          required
        >
        <span class="form-error">El correo es obligatorio</span>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Ingresa tu contraseña"
          required
        >
        <span class="form-error">La contraseña es obligatoria</span>
      </div>

      <div class="form-group checkbox">
        <input type="checkbox" id="remember" class="form-checkbox">
        <label for="remember" class="checkbox-label">Recuérdame en este dispositivo</label>
      </div>

      <button type="submit" class="btn-login">
        Iniciar Sesión
      </button>

      <div class="form-footer">
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="footer-text">© 2026 SCAF. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
